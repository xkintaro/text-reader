<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Reader</title>
    <link rel="icon" type="image/png" href="./kintaro.png" />
    <meta name="robots" content="noindex, nofollow" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

    <link href="./output.css" rel="stylesheet" />
</head>

<body class="min-h-screen selection:bg-gold-500/30 selection:text-gold-200">

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-40 bg-surface-base/90 backdrop-blur-sm border-b border-white/5 py-4">

        <div class="max-w-3xl mx-auto px-4 flex justify-between items-center">

            <h1 class="text-xs font-bold tracking-[0.2em] uppercase gold-text">
                TEXT READER
            </h1>

            <div id="readingProgress" class="text-xs font-mono text-slate-500 tracking-tighter uppercase">
                Chapter -/-
            </div>

        </div>

    </header>

    <!-- Reading Content -->
    <main class="max-w-3xl mx-auto px-4 pt-24 pb-32">

        <article id="content"
            class="reader-text whitespace-pre-wrap leading-relaxed sm:leading-loose text-lg sm:text-xl">

            <div id="initialLoader" class="flex flex-col items-center justify-center py-40 text-slate-600 gap-4">

                <i data-lucide="book-open" class="w-10 h-10 animate-pulse text-gold-600/50"></i>

                <p class="text-xs uppercase tracking-widest">Chapter Loading</p>

            </div>

        </article>

    </main>

    <!-- Bottom Action Bar -->
    <nav class="fixed bottom-2 lg:bottom-8 left-0 right-0 z-40 px-6 flex justify-center pointer-events-none">

        <div
            class="flex items-center gap-1 bg-surface-overlay/50 backdrop-blur-xl border border-white/10 rounded-full p-1.5 book-shadow pointer-events-auto">

            <button id="prevBtn"
                class="flex items-center justify-center w-8 sm:w-12 h-8 sm:h-12 rounded-full hover:bg-white/5 disabled:opacity-20 transition-all text-gold-500 cursor-pointer">

                <i data-lucide="arrow-left" class="w-5 h-5"></i>

            </button>

            <button id="menuBtn"
                class="w-8 sm:w-12 h-8 sm:h-12 flex items-center justify-center text-slate-400 hover:text-gold-400 rounded-full hover:bg-white/5 transition-colors cursor-pointer">

                <i data-lucide="layout-grid" class="w-4 h-4"></i>

            </button>

            <button id="nextBtn"
                class="flex items-center justify-center w-8 sm:w-12 h-8 sm:h-12 rounded-full hover:bg-white/5 disabled:opacity-20 transition-all text-gold-500 cursor-pointer">

                <i data-lucide="arrow-right" class="w-5 h-5"></i>

            </button>

        </div>

    </nav>

    <!-- Modal -->
    <div id="settingsModal"
        class="fixed inset-0 z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-all duration-300">

        <div class="absolute inset-0 modal-blur" id="modalOverlay"></div>

        <div class="relative w-full max-w-sm bg-surface-raised border border-gold-500/20 rounded-4xl overflow-hidden transform scale-95 transition-transform duration-300 p-8"
            id="modalContainer">

            <!-- Modal Header -->
            <div class="flex justify-between items-start mb-10">

                <div class="space-y-1">

                    <h2 class="text-2xl font-serif italic text-gold-100">
                        Library
                    </h2>

                    <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em] font-bold">
                        Text Reader
                    </p>

                </div>

                <button id="closeModal"
                    class="w-8 h-8 flex items-center justify-center rounded-full bg-white/5 text-slate-500 hover:text-white transition-colors cursor-pointer">

                    <i data-lucide="x" class="w-4 h-4"></i>

                </button>

            </div>

            <!-- Modal Body -->
            <div class="space-y-8">

                <!-- Chapter Select -->
                <div class="space-y-3">

                    <div class="flex items-center gap-2 text-[10px] uppercase tracking-widest font-bold text-gold-600">

                        <i data-lucide="list" class="w-3 h-3"></i>

                        <span>
                            Chapter List
                        </span>

                    </div>

                    <div class="relative">

                        <select id="chapterSelect"
                            class="w-full bg-surface-input text-slate-300 p-4 rounded-2xl border border-white/5 outline-none focus:border-gold-500/50 appearance-none transition-all cursor-pointer"></select>

                        <i data-lucide="chevron-down"
                            class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-600 pointer-events-none"></i>

                    </div>

                </div>

                <!-- Direct Jump -->
                <div class="space-y-3">

                    <div class="flex items-center gap-2 text-[10px] uppercase tracking-widest font-bold text-gold-600">

                        <i data-lucide="map-pin" class="w-3 h-3"></i>

                        <span>
                            Go Fast
                        </span>

                    </div>

                    <div class="flex gap-2">

                        <input id="goToInput" type="number" placeholder="Chapter No"
                            class="w-20 flex-1 bg-surface-input p-4 rounded-2xl border border-white/5 outline-none focus:border-gold-500/50 transition-all text-center">

                        <button id="goToBtn"
                            class="shrink-0 bg-gold-600/90 hover:bg-gold-500 text-black font-bold uppercase text-xs py-2 px-6 tracking-widest cursor-pointer rounded-2xl transition-all active:scale-95">
                            Go
                        </button>

                    </div>

                </div>

                <!-- Social Links -->
                <div class="pt-8 border-t border-white/5 flex justify-center gap-8">

                    <a href="https://github.com/xkintaro/text-reader" target="_blank"
                        class="group flex flex-col items-center gap-2 text-slate-500 hover:text-gold-500 transition-all">

                        <div
                            class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white/5 border border-white/5 group-hover:border-gold-500/20 group-hover:bg-gold-500/10 transition-all">

                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5">
                                <path
                                    d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">
                                </path>
                            </svg>

                        </div>

                        <span class="text-[9px] uppercase tracking-[0.2em] font-bold">
                            GitHub
                        </span>

                    </a>

                    <a href="https://discord.gg/NSQk27Zdkv" target="_blank"
                        class="group flex flex-col items-center gap-2 text-slate-500 hover:text-gold-500 transition-all">

                        <div
                            class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white/5 border border-white/5 group-hover:border-gold-500/20 group-hover:bg-gold-500/10 transition-all">

                            <svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                                <path
                                    d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z">
                                </path>
                            </svg>

                        </div>

                        <span class="text-[9px] uppercase tracking-[0.2em] font-bold">
                            Discord
                        </span>

                    </a>

                </div>

            </div>

        </div>

    </div>

    <!-- Toast -->
    <div id="statusToast"
        class="fixed top-5 left-1/2 -translate-x-1/2 z-60 px-8 py-3 rounded-2xl bg-gold-600 text-black text-xs font-bold uppercase tracking-widest opacity-0 transition-all duration-300 pointer-events-none shadow-2xl shadow-gold-600/20">
    </div>

    <script src="script.js"></script>
</body>

</html>
